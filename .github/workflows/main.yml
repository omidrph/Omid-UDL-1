name: ⬇️ 01- Down load URL

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک های دانلود (با فاصله جدا کنید)'
        required: false
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download-job:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo ""
            echo "❌ لینک دانلود وارد نشده است!"
            echo ""
            echo "📌 راهنما:"
            echo "   1️⃣ workflow را دوباره اجرا کنید"
            echo "   2️⃣ در فیلد 'لینک های دانلود' آدرس فایل را وارد کنید"
            echo "   3️⃣ برای چند فایل، لینک‌ها را با فاصله جدا کنید"
            echo ""
            exit 1
          fi
          echo "✅ لینک دانلود دریافت شد"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc wget

      - name: Downloader Started
        run: |
          echo "=========================================="
          echo "🚀 Download Manager - Improved Version"
          echo "=========================================="
          echo "Features: Resume support, Progress display, Smart splitting"
          echo "=========================================="

      - name: Download files with improved retry and resume
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          echo "Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (optimized for GitHub)"
          echo "Backup directory: $BACKUP_DIR"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain" "thunder" "lightning" "storm" "wind" "fire" "water" "earth" "air")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            local CLEAN_NAME=$(echo "$NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            if [ ! -d "$BASE_PATH/$CLEAN_NAME" ] && [ ! -d "$BACKUP_DIR/$CLEAN_NAME" ]; then
              echo "$CLEAN_NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${CLEAN_NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${CLEAN_NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${CLEAN_NAME}_${RANDOM_SUFFIX}"
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          get_file_size() {
            local file="$1"
            if [ -f "$file" ]; then
              stat -c%s "$file" 2>/dev/null || echo "0"
            else
              echo "0"
            fi
          }

          format_size() {
            local size=$1
            if [ $size -ge 1073741824 ]; then
              echo "$(echo "scale=2; $size / 1073741824" | bc) GB"
            elif [ $size -ge 1048576 ]; then
              echo "$(echo "scale=2; $size / 1048576" | bc) MB"
            elif [ $size -ge 1024 ]; then
              echo "$(echo "scale=2; $size / 1024" | bc) KB"
            else
              echo "${size} B"
            fi
          }

          create_error_file() {
            local FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local BASENAME_NO_EXT="${FILENAME%.*}"
            local FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            {
              echo "# ${FILENAME} - Download Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **File** | \`${FILENAME}\` |"
              echo "| **URL** | ${URL} |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Possible Solutions"
              echo ""
              echo "- Check if the URL is correct and accessible"
              echo "- The file may have been removed or moved"
              echo "- The server may require authentication"
              echo "- Some servers block automated downloads (403 Forbidden)"
              echo "- Try again later if it is a temporary server issue"
              echo "- The file might be too large for GitHub Actions timeout"
              echo ""
              echo "---"
            } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            echo "Error file created: $BACKUP_DIR/$FOLDER_NAME/README.md"
          }

          download_with_resume() {
            local URL="$1"
            local FILENAME="$2"
            local OUTPUT_DIR="tmp_downloads"
            local OUTPUT_PATH="${OUTPUT_DIR}/${FILENAME}"
            
            local MAX_RETRIES=5
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""

            echo "Starting download: $FILENAME"
            
            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📥 Attempt $attempt of $MAX_RETRIES for: $FILENAME"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              
              local EXISTING_SIZE=$(get_file_size "$OUTPUT_PATH")
              if [ "$EXISTING_SIZE" -gt 0 ]; then
                echo "ℹ️ Resume detected: Already downloaded $(format_size $EXISTING_SIZE)"
                echo "➡️ Continuing from where it stopped..."
              fi

              rm -f "${OUTPUT_PATH}.aria2"

              ERROR_LOG=$(aria2c \
                --max-connection-per-server=4 \
                --split=4 \
                --min-split-size=10M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --continue=true \
                --summary-interval=1 \
                --console-log-level=notice \
                --dir="$OUTPUT_DIR" \
                --out="$FILENAME" \
                --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                --referer="$URL" \
                "$URL" 2>&1 | tee /dev/tty)

              if [ -f "$OUTPUT_PATH" ] && [ -s "$OUTPUT_PATH" ]; then
                local FINAL_SIZE=$(get_file_size "$OUTPUT_PATH")
                if [ "$FINAL_SIZE" -gt 0 ]; then
                  if [ "$EXISTING_SIZE" -gt 0 ] && [ "$FINAL_SIZE" -eq "$EXISTING_SIZE" ]; then
                    echo "⚠️ File size unchanged, might be stuck. Retrying with fresh start..."
                    rm -f "$OUTPUT_PATH"
                    continue
                  fi
                  SUCCESS=true
                  echo ""
                  echo "✅ Successfully downloaded: $FILENAME"
                  echo "📊 Final size: $(format_size $FINAL_SIZE)"
                  break
                fi
              fi

              echo "⚠️ Attempt $attempt failed"
              rm -f "$OUTPUT_PATH" "${OUTPUT_PATH}.aria2"
              
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "⏳ Waiting ${RETRY_DELAY} seconds before retry..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))
              fi
            done

            if [ "$SUCCESS" = true ] && [ -f "$OUTPUT_PATH" ] && [ -s "$OUTPUT_PATH" ]; then
              return 0
            fi

            rm -f "$OUTPUT_PATH" "${OUTPUT_PATH}.aria2"
            create_error_file "$FILENAME" "Download failed after $MAX_RETRIES attempts. Last error: $ERROR_LOG" "$URL"
            return 1
          }

          TOTAL_URLS=0
          SUCCESSFUL=0
          FAILED=0

          for URL in $URLS; do
            TOTAL_URLS=$((TOTAL_URLS + 1))
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "📁 Processing URL #$TOTAL_URLS"
            echo "🔗 Source: $URL"
            echo "════════════════════════════════════════════════════════"
            
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*\/\\]/_/g')
            
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "." ] || [ "$FILENAME" = ".." ]; then
              FILENAME="downloaded_file_$(date +%s)_${TOTAL_URLS}"
            fi
            
            if download_with_resume "$URL" "$FILENAME"; then
              SUCCESSFUL=$((SUCCESSFUL + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "📊 DOWNLOAD SUMMARY"
          echo "════════════════════════════════════════════════════════"
          echo "✅ Successful: $SUCCESSFUL"
          echo "❌ Failed: $FAILED"
          echo "📁 Total: $TOTAL_URLS"
          echo "════════════════════════════════════════════════════════"

      - name: Process files in normal mode
        if: github.event.inputs.mode == 'normal'
        run: |
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE_MB="45"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_SIZE_MB * 1024 * 1024 ))
          
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          PROCESSED=0
          SKIPPED=0
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Processing files in NORMAL mode"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for FILE in tmp_downloads/*; do
            if [ ! -f "$FILE" ]; then
              continue
            fi
            
            if [ ! -s "$FILE" ]; then
              echo "⚠️ Skipping empty file: $(basename "$FILE")"
              rm -f "$FILE"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            
            BASENAME=$(basename "$FILE")
            BASENAME_NO_EXT="${BASENAME%.*}"
            FILE_SIZE=$(stat -c%s "$FILE")
            
            echo ""
            echo "▶️ Processing: $BASENAME"
            echo "   Size: $(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo "$FILE_SIZE bytes")"
            
            FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
            
            # Save original URL for reference
            ORIGINAL_URL=""
            for URL in ${{ github.event.inputs.urls }}; do
              if [[ "$URL" == *"$BASENAME"* ]] || [[ "$BASENAME" == *"$(basename "$URL")"* ]]; then
                ORIGINAL_URL="$URL"
                break
              fi
            done
            
            if [ "$FILE_SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              echo "   📦 File exceeds ${SPLIT_SIZE_MB}MB threshold - Creating split archive"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE_MB}m "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              else
                zip -j -s ${SPLIT_SIZE_MB}m "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              fi
              
              PART_COUNT=$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | wc -l)
              
              README_FILE="$BACKUP_DIR/$FOLDER_NAME/README.md"
              {
                echo "# 📦 ${BASENAME_NO_EXT}"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Original File** | \`${BASENAME}\` |"
                if [ -n "$ORIGINAL_URL" ]; then
                  echo "| **Source URL** | [Link](${ORIGINAL_URL}) |"
                fi
                echo "| **Original Size** | $(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo "$FILE_SIZE bytes") |"
                echo "| **Split Parts** | ${PART_COUNT} parts |"
                echo "| **Part Size** | ${SPLIT_SIZE_MB} MB |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo "| **Status** | ✅ Complete |"
                echo ""
                echo "---"
                echo ""
                echo "## Download Links"
                echo ""
                echo "| # | File | Link |"
                echo "|---|------|------|"
              } >> "$README_FILE"
              
              PART_NUM=0
              for PART in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort); do
                PART_NUM=$((PART_NUM + 1))
                PART_NAME=$(basename "$PART")
                PART_ENCODED=$(urlencode "$PART_NAME")
                RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                echo "| ${PART_NUM} | \`${PART_NAME}\` | [Download](${RAW_LINK}) |" >> "$README_FILE"
              done
              
              {
                echo ""
                echo "---"
                echo ""
                echo "## How to Extract"
                echo ""
                echo "1. **Download all ${PART_COUNT} parts**"
                echo "2. **Open** \`${FOLDER_NAME}.zip\` with 7-Zip, WinRAR, or any zip tool"
                echo "3. **Extract** — all parts combine automatically"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "4. Enter the password: \`${ZIP_PASSWORD}\`"
                fi
                echo ""
                echo "---"
                echo "*Downloaded: $(date '+%Y-%m-%d %H:%M:%S UTC')*"
              } >> "$README_FILE"
              
              echo "   ✅ Created split archive with ${PART_COUNT} parts"
              
            else
              echo "   📦 Creating single zip archive"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              else
                zip -j "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              fi
              
              ARCHIVE_SIZE=$(stat -c%s "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip")
              RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/downloads/${FOLDER_ENCODED}/${FOLDER_ENCODED}.zip"
              
              README_FILE="$BACKUP_DIR/$FOLDER_NAME/README.md"
              {
                echo "# 📦 ${BASENAME_NO_EXT}"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Original File** | \`${BASENAME}\` |"
                if [ -n "$ORIGINAL_URL" ]; then
                  echo "| **Source URL** | [Link](${ORIGINAL_URL}) |"
                fi
                echo "| **Original Size** | $(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo "$FILE_SIZE bytes") |"
                echo "| **Archive Size** | $(numfmt --to=iec $ARCHIVE_SIZE 2>/dev/null || echo "$ARCHIVE_SIZE bytes") |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo "| **Status** | ✅ Complete |"
                echo ""
                echo "---"
                echo ""
                echo "## Download Link"
                echo ""
                echo "🔗 [${FOLDER_NAME}.zip](${RAW_LINK})"
                echo ""
                echo "---"
                echo ""
                echo "## How to Extract"
                echo ""
                echo "1. **Download** the ZIP file"
                echo "2. **Extract** with 7-Zip, WinRAR, or any zip tool"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "3. Enter the password: \`${ZIP_PASSWORD}\`"
                fi
                echo ""
                echo "---"
                echo "*Downloaded: $(date '+%Y-%m-%d %H:%M:%S UTC')*"
              } > "$README_FILE"
              
              echo "   ✅ Created zip archive"
            fi
            
            PROCESSED=$((PROCESSED + 1))
            rm -f "$FILE"
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Processing Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Processed: $PROCESSED files"
          echo "⚠️ Skipped: $SKIPPED files"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          rm -rf tmp_downloads

      - name: Process files in zip-all mode
        if: github.event.inputs.mode == 'zip'
        run: |
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE_MB="45"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER_NAME="archive_${TIMESTAMP}"
          
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Creating combined archive (ZIP ALL mode)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          FILE_LIST=()
          TOTAL_SIZE=0
          
          for FILE in tmp_downloads/*; do
            if [ -f "$FILE" ] && [ -s "$FILE" ]; then
              FILE_LIST+=("$FILE")
              FILE_SIZE=$(stat -c%s "$FILE")
              TOTAL_SIZE=$((TOTAL_SIZE + FILE_SIZE))
            fi
          done
          
          FILE_COUNT=${#FILE_LIST[@]}
          
          if [ $FILE_COUNT -eq 0 ]; then
            echo "⚠️ No valid files to archive"
            rm -rf tmp_downloads
            exit 0
          fi
          
          echo "📁 Creating archive with $FILE_COUNT files"
          echo "📊 Total size: $(numfmt --to=iec $TOTAL_SIZE 2>/dev/null || echo "$TOTAL_SIZE bytes")"
          
          if [ "$TOTAL_SIZE" -gt $(( SPLIT_SIZE_MB * 1024 * 1024 )) ] || [ $FILE_COUNT -gt 1 ]; then
            echo "📦 Creating split archive (${SPLIT_SIZE_MB}MB parts)"
            
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE_MB}m "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            else
              zip -j -s ${SPLIT_SIZE_MB}m "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            fi
          else
            echo "📦 Creating single archive"
            
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            else
              zip -j "$BACKUP_DIR/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            fi
          fi
          
          PART_COUNT=$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | wc -l)
          FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
          
          README_FILE="$BACKUP_DIR/$FOLDER_NAME/README.md"
          {
            echo "# 📦 Archive ${TIMESTAMP}"
            echo ""
            echo "---"
            echo ""
            echo "## Download Information"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Files Included** | ${FILE_COUNT} files |"
            echo "| **Total Size** | $(numfmt --to=iec $TOTAL_SIZE 2>/dev/null || echo "$TOTAL_SIZE bytes") |"
            echo "| **Split Parts** | ${PART_COUNT} parts |"
            echo "| **Part Size** | ${SPLIT_SIZE_MB} MB |"
            if [ -n "$ZIP_PASSWORD" ]; then
              echo "| **Password Protected** | **YES** |"
            else
              echo "| **Password Protected** | **NO** |"
            fi
            echo "| **Status** | ✅ Complete |"
            echo ""
            echo "---"
            echo ""
            echo "## Included Files"
            echo ""
          } >> "$README_FILE"
          
          for FILE in "${FILE_LIST[@]}"; do
            echo "- $(basename "$FILE")" >> "$README_FILE"
          done
          
          {
            echo ""
            echo "---"
            echo ""
            echo "## Download Links"
            echo ""
            echo "| # | File | Link |"
            echo "|---|------|------|"
          } >> "$README_FILE"
          
          PART_NUM=0
          for PART in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort); do
            PART_NUM=$((PART_NUM + 1))
            PART_NAME=$(basename "$PART")
            PART_ENCODED=$(urlencode "$PART_NAME")
            RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
            echo "| ${PART_NUM} | \`${PART_NAME}\` | [Download](${RAW_LINK}) |" >> "$README_FILE"
          done
          
          {
            echo ""
            echo "---"
            echo ""
            echo "## How to Extract"
            echo ""
            echo "1. **Download all ${PART_COUNT} parts**"
            echo "2. **Open** \`${FOLDER_NAME}.zip\` with 7-Zip, WinRAR, or any zip tool"
            echo "3. **Extract** — all parts combine automatically"
            if [ -n "$ZIP_PASSWORD" ]; then
              echo "4. Enter the password: \`${ZIP_PASSWORD}\`"
            fi
            echo ""
            echo "---"
            echo "*Archive created: $(date '+%Y-%m-%d %H:%M:%S UTC')*"
          } >> "$README_FILE"
          
          echo "✅ Created archive with ${FILE_COUNT} files (${PART_COUNT} parts)"
          rm -rf tmp_downloads

      - name: Update README.md with download links
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)

          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          {
            echo "# 📁 Downloaded Files"
            echo ""
            echo "This folder contains all downloaded files."
            echo ""
            echo "## File List"
            echo ""
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "- [${FOLDER}](./${FOLDER_ENCODED}/)"
              fi
            done
            echo ""
            echo "---"
            echo "*Last updated: $(date '+%Y-%m-%d %H:%M:%S UTC')*"
          } > "downloads/README.md"

          echo "downloads/README.md created with list of downloaded files"

          SECTION_TITLE="📦 Downloaded Files"

          if [ ! -f "README.md" ]; then
            echo "# Download Manager" > README.md
            echo "" >> README.md
            echo "Download files directly to your GitHub repository." >> README.md
            echo "" >> README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "${COUNTER}. [${FOLDER}]($REPO_URL/$FOLDER_ENCODED)"
                echo ""
                COUNTER=$((COUNTER + 1))
              fi
            done
            echo "---"
          } >> README.md

          echo "README.md updated with download links"

      - name: Commit and push files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 Committing and pushing files"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi

          git add downloads/
          git add README.md

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          git commit -m "Add downloaded files [skip ci]"

          MAX_RETRIES=5
          for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
            echo "Push attempt $attempt of $MAX_RETRIES"
            if git push origin HEAD:"$BRANCH"; then
              echo "✅ Push successful!"
              exit 0
            else
              echo "⚠️ Push failed, retrying..."
              sleep 5
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              mkdir -p downloads
              if [ -d "$BACKUP_DIR" ]; then
                cp -r "$BACKUP_DIR"/* downloads/
              fi
              git add downloads/
              git add README.md
              git commit -m "Add downloaded files [skip ci]" || true
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1

      - name: Final summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DOWNLOAD COMPLETED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          DOWNLOAD_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
          FOLDER_COUNT=$(find downloads -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          
          echo "📊 Summary:"
          echo "   📁 Folders created: $FOLDER_COUNT"
          echo "   📄 Files uploaded: $DOWNLOAD_COUNT"
          echo ""
          echo "🔗 Access your files at:"
          echo "   https://github.com/${{ github.repository }}/tree/main/downloads"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
