name: ⬇️ دانلود فایل

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک های دانلود (چند لینک را با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: '📦 حالت دانلود'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 رمز عبور برای فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string
      split_size:
        description: '📏 حجم هر قسمت به مگابایت (پیشفرض 45)'
        required: false
        default: '45'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for large files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip unzip curl wget bc

      - name: Create necessary directories
        run: |
          mkdir -p downloads
          mkdir -p temp_downloads

      - name: Start download process
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE_MB="${{ github.event.inputs.split_size }}"
          
          echo "=========================================="
          echo "Starting download process"
          echo "=========================================="
          echo "Mode: $MODE"
          echo "Split size: ${SPLIT_SIZE_MB}MB"
          echo "Password: $(if [ -n "$ZIP_PASSWORD" ]; then echo "Enabled"; else echo "Disabled"; fi)"
          echo "=========================================="

      - name: Download files with aria2
        run: |
          URLS="${{ github.event.inputs.urls }}"
          
          download_with_aria2() {
            local url="$1"
            local filename="$2"
            
            aria2c \
              --max-connection-per-server=4 \
              --split=4 \
              --min-split-size=10M \
              --max-tries=5 \
              --retry-wait=5 \
              --timeout=60 \
              --connect-timeout=30 \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --dir="temp_downloads" \
              --out="$filename" \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$url" 2>&1
          }
          
          download_with_curl() {
            local url="$1"
            local filename="$2"
            
            curl -L -f --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 1800 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -o "temp_downloads/$filename" \
              "$url" 2>&1
          }
          
          extract_filename() {
            local url="$1"
            local filename=$(basename "$url" | sed 's/%20/ /g' | sed 's/%2F/-/g')
            filename=$(echo "$filename" | sed 's/[?#].*//')
            filename=$(echo "$filename" | sed 's/[<>:"|?*\/\\]/_/g')
            if [ -z "$filename" ]; then
              filename="file_$(date +%s)_$RANDOM"
            fi
            echo "$filename"
          }
          
          SUCCESS=0
          FAILED=0
          
          for URL in $URLS; do
            FILENAME=$(extract_filename "$URL")
            echo "=========================================="
            echo "Downloading: $FILENAME"
            echo "From: $URL"
            echo "=========================================="
            
            DOWNLOAD_SUCCESS=false
            MAX_RETRIES=3
            
            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES"
              
              if download_with_aria2 "$URL" "$FILENAME"; then
                if [ -f "temp_downloads/$FILENAME" ] && [ -s "temp_downloads/$FILENAME" ]; then
                  DOWNLOAD_SUCCESS=true
                  echo "Successfully downloaded: $FILENAME"
                  break
                fi
              fi
              
              rm -f "temp_downloads/$FILENAME"
              
              if download_with_curl "$URL" "$FILENAME"; then
                if [ -f "temp_downloads/$FILENAME" ] && [ -s "temp_downloads/$FILENAME" ]; then
                  DOWNLOAD_SUCCESS=true
                  echo "Successfully downloaded with curl: $FILENAME"
                  break
                fi
              fi
              
              rm -f "temp_downloads/$FILENAME"
              echo "Attempt $attempt failed"
              sleep $((attempt * 3))
            done
            
            if [ "$DOWNLOAD_SUCCESS" = true ]; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAILED=$((FAILED + 1))
              echo "Failed to download: $FILENAME"
            fi
          done
          
          echo "=========================================="
          echo "Download summary"
          echo "=========================================="
          echo "Successful: $SUCCESS"
          echo "Failed: $FAILED"
          echo "=========================================="

      - name: Process files in normal mode
        if: github.event.inputs.mode == 'normal'
        run: |
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE_MB="${{ github.event.inputs.split_size }}"
          SPLIT_THRESHOLD=$(( SPLIT_SIZE_MB * 1024 * 1024 ))
          
          PROCESSED=0
          
          for FILE in temp_downloads/*; do
            if [ ! -f "$FILE" ] || [ ! -s "$FILE" ]; then
              echo "Skipping invalid file: $FILE"
              continue
            fi
            
            BASENAME=$(basename "$FILE")
            BASENAME_NO_EXT="${BASENAME%.*}"
            FILE_SIZE=$(stat -c%s "$FILE")
            
            echo "Processing: $BASENAME (Size: $(numfmt --to=iec $FILE_SIZE))"
            
            FOLDER_NAME=$(echo "$BASENAME_NO_EXT" | sed 's/[^a-zA-Z0-9._-]/_/g')
            COUNTER=1
            ORIGINAL_FOLDER_NAME="$FOLDER_NAME"
            while [ -d "downloads/$FOLDER_NAME" ]; do
              FOLDER_NAME="${ORIGINAL_FOLDER_NAME}_${COUNTER}"
              COUNTER=$((COUNTER + 1))
            done
            
            mkdir -p "downloads/$FOLDER_NAME"
            
            if [ "$FILE_SIZE" -gt "$SPLIT_THRESHOLD" ]; then
              echo "File is large, creating split archive"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE_MB}m "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              else
                zip -j -s ${SPLIT_SIZE_MB}m "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              fi
              
              PART_COUNT=$(ls downloads/$FOLDER_NAME/*.zip downloads/$FOLDER_NAME/*.z[0-9]* 2>/dev/null | wc -l)
              
              README_FILE="downloads/$FOLDER_NAME/README.md"
              echo "# $BASENAME_NO_EXT" > "$README_FILE"
              echo "" >> "$README_FILE"
              echo "## Download Information" >> "$README_FILE"
              echo "" >> "$README_FILE"
              echo "| Property | Value |" >> "$README_FILE"
              echo "|----------|-------|" >> "$README_FILE"
              echo "| Original File | \`$BASENAME\` |" >> "$README_FILE"
              echo "| Original Size | $(numfmt --to=iec $FILE_SIZE) |" >> "$README_FILE"
              echo "| Split Parts | $PART_COUNT parts |" >> "$README_FILE"
              echo "| Part Size | ${SPLIT_SIZE_MB} MB |" >> "$README_FILE"
              if [ -n "$ZIP_PASSWORD" ]; then
                echo "| Password Protected | YES |" >> "$README_FILE"
              else
                echo "| Password Protected | NO |" >> "$README_FILE"
              fi
              echo "" >> "$README_FILE"
              echo "## Download Links" >> "$README_FILE"
              echo "" >> "$README_FILE"
              
              PART_NUM=0
              for PART in $(ls downloads/$FOLDER_NAME/*.zip downloads/$FOLDER_NAME/*.z[0-9]* 2>/dev/null | sort); do
                PART_NUM=$((PART_NUM + 1))
                PART_NAME=$(basename "$PART")
                echo "$PART_NUM. \`$PART_NAME\`" >> "$README_FILE"
              done
              
              echo "" >> "$README_FILE"
              echo "## How to Extract" >> "$README_FILE"
              echo "" >> "$README_FILE"
              echo "1. Download all parts" >> "$README_FILE"
              echo "2. Place all parts in the same folder" >> "$README_FILE"
              echo "3. Open the main .zip file with 7-Zip or WinRAR" >> "$README_FILE"
              echo "4. Extract normally" >> "$README_FILE"
              if [ -n "$ZIP_PASSWORD" ]; then
                echo "5. Enter the password when prompted" >> "$README_FILE"
              fi
              
            else
              echo "Creating zip archive"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              else
                zip -j "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "$FILE"
              fi
              
              ARCHIVE_SIZE=$(stat -c%s "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip")
              
              README_FILE="downloads/$FOLDER_NAME/README.md"
              echo "# $BASENAME_NO_EXT" > "$README_FILE"
              echo "" >> "$README_FILE"
              echo "## Download Information" >> "$README_FILE"
              echo "" >> "$README_FILE"
              echo "| Property | Value |" >> "$README_FILE"
              echo "|----------|-------|" >> "$README_FILE"
              echo "| Original File | \`$BASENAME\` |" >> "$README_FILE"
              echo "| Original Size | $(numfmt --to=iec $FILE_SIZE) |" >> "$README_FILE"
              echo "| Archive Size | $(numfmt --to=iec $ARCHIVE_SIZE) |" >> "$README_FILE"
              if [ -n "$ZIP_PASSWORD" ]; then
                echo "| Password Protected | YES |" >> "$README_FILE"
              else
                echo "| Password Protected | NO |" >> "$README_FILE"
              fi
              echo "" >> "$README_FILE"
              echo "## Download Link" >> "$README_FILE"
              echo "" >> "$README_FILE"
              echo "[${FOLDER_NAME}.zip](./${FOLDER_NAME}.zip)" >> "$README_FILE"
              echo "" >> "$README_FILE"
              echo "## How to Extract" >> "$README_FILE"
              echo "" >> "$README_FILE"
              echo "1. Download the ZIP file" >> "$README_FILE"
              echo "2. Extract with any archive tool" >> "$README_FILE"
              if [ -n "$ZIP_PASSWORD" ]; then
                echo "3. Enter the password when prompted" >> "$README_FILE"
              fi
            fi
            
            PROCESSED=$((PROCESSED + 1))
            echo "Processed: $BASENAME"
          done
          
          echo "Processed $PROCESSED files in normal mode"
          rm -rf temp_downloads

      - name: Process files in zip-all mode
        if: github.event.inputs.mode == 'zip'
        run: |
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE_MB="${{ github.event.inputs.split_size }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER_NAME="archive_${TIMESTAMP}"
          
          mkdir -p "downloads/$FOLDER_NAME"
          
          FILE_LIST=()
          TOTAL_SIZE=0
          
          for FILE in temp_downloads/*; do
            if [ -f "$FILE" ] && [ -s "$FILE" ]; then
              FILE_LIST+=("$FILE")
              FILE_SIZE=$(stat -c%s "$FILE")
              TOTAL_SIZE=$((TOTAL_SIZE + FILE_SIZE))
            fi
          done
          
          FILE_COUNT=${#FILE_LIST[@]}
          
          if [ $FILE_COUNT -eq 0 ]; then
            echo "No valid files to archive"
            rm -rf temp_downloads
            exit 0
          fi
          
          echo "Creating archive with $FILE_COUNT files (Total size: $(numfmt --to=iec $TOTAL_SIZE))"
          
          if [ "$TOTAL_SIZE" -gt $(( SPLIT_SIZE_MB * 1024 * 1024 )) ] || [ $FILE_COUNT -gt 1 ]; then
            echo "Creating split archive"
            
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_SIZE_MB}m "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            else
              zip -j -s ${SPLIT_SIZE_MB}m "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            fi
          else
            echo "Creating single archive"
            
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            else
              zip -j "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" "${FILE_LIST[@]}"
            fi
          fi
          
          PART_COUNT=$(ls downloads/$FOLDER_NAME/*.zip downloads/$FOLDER_NAME/*.z[0-9]* 2>/dev/null | wc -l)
          
          README_FILE="downloads/$FOLDER_NAME/README.md"
          echo "# Archive $TIMESTAMP" > "$README_FILE"
          echo "" >> "$README_FILE"
          echo "## Download Information" >> "$README_FILE"
          echo "" >> "$README_FILE"
          echo "| Property | Value |" >> "$README_FILE"
          echo "|----------|-------|" >> "$README_FILE"
          echo "| Files Included | $FILE_COUNT files |" >> "$README_FILE"
          echo "| Total Size | $(numfmt --to=iec $TOTAL_SIZE) |" >> "$README_FILE"
          echo "| Split Parts | $PART_COUNT parts |" >> "$README_FILE"
          echo "| Part Size | ${SPLIT_SIZE_MB} MB |" >> "$README_FILE"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "| Password Protected | YES |" >> "$README_FILE"
          else
            echo "| Password Protected | NO |" >> "$README_FILE"
          fi
          echo "" >> "$README_FILE"
          echo "## Included Files" >> "$README_FILE"
          echo "" >> "$README_FILE"
          
          for FILE in "${FILE_LIST[@]}"; do
            echo "- $(basename "$FILE")" >> "$README_FILE"
          done
          
          echo "" >> "$README_FILE"
          echo "## Download Links" >> "$README_FILE"
          echo "" >> "$README_FILE"
          
          PART_NUM=0
          for PART in $(ls downloads/$FOLDER_NAME/*.zip downloads/$FOLDER_NAME/*.z[0-9]* 2>/dev/null | sort); do
            PART_NUM=$((PART_NUM + 1))
            PART_NAME=$(basename "$PART")
            echo "$PART_NUM. \`$PART_NAME\`" >> "$README_FILE"
          done
          
          echo "" >> "$README_FILE"
          echo "## How to Extract" >> "$README_FILE"
          echo "" >> "$README_FILE"
          echo "1. Download all parts" >> "$README_FILE"
          echo "2. Place all parts in the same folder" >> "$README_FILE"
          echo "3. Open the main .zip file with 7-Zip or WinRAR" >> "$README_FILE"
          echo "4. Extract normally" >> "$README_FILE"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "5. Enter the password when prompted" >> "$README_FILE"
          fi
          
          echo "Created archive with $FILE_COUNT files"
          rm -rf temp_downloads

      - name: Generate main index file
        run: |
          CURRENT_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          
          cat > downloads/README.md << 'EOF'
          # 📁 Downloads Index
          
          This folder contains all downloaded and processed files.
          
          EOF
          
          echo "## Download Summary" >> downloads/README.md
          echo "" >> downloads/README.md
          echo "| Folder | Status |" >> downloads/README.md
          echo "|--------|--------|" >> downloads/README.md
          
          for folder in downloads/*/; do
            if [ -d "$folder" ]; then
              folder_name=$(basename "$folder")
              if [ -f "${folder}README.md" ]; then
                echo "| [$folder_name](./$folder_name/) | ✅ Ready |" >> downloads/README.md
              else
                echo "| [$folder_name](./$folder_name/) | ⚠️ Partial |" >> downloads/README.md
              fi
            fi
          done
          
          echo "" >> downloads/README.md
          echo "---" >> downloads/README.md
          echo "" >> downloads/README.md
          echo "*Last updated: $CURRENT_DATE*" >> downloads/README.md
          
          echo "Generated main index file"

      - name: Update main repository README
        run: |
          CURRENT_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          DOWNLOAD_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
          FOLDER_COUNT=$(find downloads -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          
          if [ ! -f "README.md" ]; then
            cat > README.md << 'EOF'
          # 🚀 Download Manager for GitHub Actions
          
          Download files directly to your GitHub repository using GitHub Actions.
          
          ---
          
          ## Features
          
          * Download from any direct URL
          * Support for large files (tested up to 28GB)
          * Automatic split of large files into smaller parts
          * Optional password protection for ZIP files
          * Parallel downloads using aria2
          * Automatic retry on failure
          
          ---
          
          ## How to Use
          
          1. Go to the **Actions** tab
          2. Select **Download File** workflow
          3. Click **Run workflow**
          4. Enter your download URLs
          5. Choose mode (normal or zip)
          6. (Optional) Add password for ZIP files
          7. Click **Run workflow**
          
          ---
          
          ## Clean Downloads
          
          Use the **Clean Downloads** workflow to delete all downloaded files.
          
          ---
          
          EOF
          fi
          
          if grep -q "## Download Status" README.md; then
            sed -i '/## Download Status/,/---/d' README.md
          fi
          
          cat >> README.md << EOF
          
          ## Download Status
          
          | Metric | Value |
          |--------|-------|
          | Total Downloads | $DOWNLOAD_COUNT files |
          | Folders | $FOLDER_COUNT |
          | Last Updated | $CURRENT_DATE |
          
          [View Downloads](./downloads)
          
          ---
          
          EOF
          
          echo "Updated main README"

      - name: Commit and push all files
        run: |
          git add downloads/
          git add README.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Download and process files [skip ci]"
          
          MAX_RETRIES=5
          RETRY_DELAY=5
          
          for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
            echo "Push attempt $attempt of $MAX_RETRIES"
            
            if git push origin HEAD:main 2>&1; then
              echo "Successfully pushed all files"
              exit 0
            else
              echo "Push failed, attempt $attempt of $MAX_RETRIES"
              
              if [ $attempt -lt $MAX_RETRIES ]; then
                git fetch origin main
                git reset --hard origin/main
                git add downloads/
                git add README.md
                git commit -m "Download and process files [skip ci]" || true
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))
              fi
            fi
          done
          
          echo "Failed to push after $MAX_RETRIES attempts"
          exit 1

      - name: Final summary
        run: |
          echo ""
          echo "=========================================="
          echo "Download completed successfully"
          echo "=========================================="
          echo ""
          
          DOWNLOAD_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
          FOLDER_COUNT=$(find downloads -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          
          echo "Summary:"
          echo "  Folders created: $FOLDER_COUNT"
          echo "  Files uploaded: $DOWNLOAD_COUNT"
          echo ""
          echo "Access your files at:"
          echo "  https://github.com/${{ github.repository }}/tree/main/downloads"
          echo ""
          echo "=========================================="
